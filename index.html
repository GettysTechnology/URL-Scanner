<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Scanner — Threat Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e2530;
    --border2: #252d38;
    --text: #c8d4e0;
    --text-muted: #4a5a6a;
    --text-dim: #2a3a4a;
    --accent-vt: #ff6b35;
    --accent-us: #00d4aa;
    --accent-vt-dim: rgba(255,107,53,0.12);
    --accent-us-dim: rgba(0,212,170,0.12);
    --danger: #ff4444;
    --warn: #ffaa00;
    --safe: #00cc88;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    border: 1px solid var(--border2);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent-us);
    letter-spacing: -1px;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .dot.active { background: var(--safe); box-shadow: 0 0 6px var(--safe); }
  .dot.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  .page-title {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 40px;
  }

  /* URL Input */
  .scan-section {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 28px;
  }

  .scan-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .url-input-row {
    display: flex;
    gap: 0;
  }

  .url-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-right: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--accent-us); }
  .url-input::placeholder { color: var(--text-dim); }

  .scan-btn {
    background: var(--accent-us);
    border: 1px solid var(--accent-us);
    color: var(--bg);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 13px 24px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .scan-btn:hover { background: #00f0c0; border-color: #00f0c0; }
  .scan-btn:active { background: #00b890; }
  .scan-btn:disabled {
    background: var(--text-dim);
    border-color: var(--text-dim);
    color: var(--bg);
    cursor: not-allowed;
  }

  .service-toggles {
    display: flex;
    gap: 16px;
    margin-top: 14px;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    font-family: var(--mono);
    font-size: 11px;
  }

  .toggle input { display: none; }

  .toggle-box {
    width: 14px; height: 14px;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 9px;
  }
  .toggle input:checked + .toggle-box.vt {
    background: var(--accent-vt-dim);
    border-color: var(--accent-vt);
    color: var(--accent-vt);
  }
  .toggle input:checked + .toggle-box.us {
    background: var(--accent-us-dim);
    border-color: var(--accent-us);
    color: var(--accent-us);
  }
  .toggle-text-vt { color: var(--accent-vt); }
  .toggle-text-us { color: var(--accent-us); }

  /* Results */
  .results-section { display: none; }
  .results-section.visible { display: block; }

  .results-header {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .service-badge {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge-vt { color: var(--accent-vt); }
  .badge-us { color: var(--accent-us); }

  .badge-bar {
    width: 2px; height: 12px;
    background: currentColor;
  }

  .verdict {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border: 1px solid currentColor;
  }
  .verdict.clean { color: var(--safe); }
  .verdict.malicious { color: var(--danger); }
  .verdict.suspicious { color: var(--warn); }
  .verdict.pending { color: var(--text-muted); }
  .verdict.error { color: var(--text-muted); }

  .result-body {
    padding: 16px;
    display: grid;
    gap: 8px;
  }

  .result-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 16px;
    align-items: start;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .result-row:last-child { border-bottom: none; }

  .result-key {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding-top: 1px;
  }

  .result-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
  }

  .result-val a {
    color: var(--accent-us);
    text-decoration: none;
  }
  .result-val a:hover { text-decoration: underline; }

  .stats-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
  }

  .stat-count {
    font-size: 16px;
    font-weight: 600;
  }
  .stat-count.red { color: var(--danger); }
  .stat-count.yellow { color: var(--warn); }
  .stat-count.green { color: var(--safe); }
  .stat-count.muted { color: var(--text-muted); }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  .error-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    padding: 16px;
  }

  .loading-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .spinner {
    width: 12px; height: 12px;
    border: 1px solid var(--border2);
    border-top-color: var(--accent-us);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* History */
  .history-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .history-header {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--border2); }

  .history-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 500px;
  }

  .history-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    padding: 12px 0 0;
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▣</div>
    <div>
      <div class="logo-text">ThreatScan</div>
      <div class="logo-sub">URL Intelligence</div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="vtStatus">
      <div class="dot" id="vtDot"></div>
      VirusTotal
    </div>
    <div class="status-dot" id="usStatus">
      <div class="dot" id="usDot"></div>
      URLScan.io
    </div>
  </div>
</header>

<main>
  <div class="page-title">// Threat Intelligence</div>
  <h1>URL Scanner</h1>
  <p class="subtitle">Submit URLs to VirusTotal and URLScan.io for analysis.</p>


  <!-- Scan Input -->
  <div class="scan-section">
    <div class="scan-label">// Target URL</div>
    <div class="url-input-row">
      <input class="url-input" type="text" id="urlInput" placeholder="https://example.com" 
        onkeydown="if(event.key==='Enter') submitScan()">
      <button class="scan-btn" id="scanBtn" onclick="submitScan()">Scan →</button>
    </div>
    <div class="service-toggles">
      <label class="toggle">
        <input type="checkbox" id="useVT" checked>
        <div class="toggle-box vt">✓</div>
        <span class="toggle-text-vt">VirusTotal</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="useUS" checked>
        <div class="toggle-box us">✓</div>
        <span class="toggle-text-us">URLScan.io</span>
      </label>
    </div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <span>// Scan Results</span>
      <button class="clear-btn" onclick="clearResults()">Clear</button>
    </div>
    <div id="resultsContainer"></div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header">// Recent Scans</div>
    <div class="history-list" id="historyList"></div>
  </div>
</main>

<script>
  const HISTORY_KEY = 'threatscan_history';
  const US_API_KEY = atob('MDE5ZDI2NjAtNTU1Yi03MDE4LWFhZGUtYTUwNzI0NjI1ZTBi');
  const VT_API_KEY = atob('ZWUxYWFkZDZmNzliMGU1M2FlMWJiZWM1NDliMDIyYmM2YjM3YTFmNmE1OGEwNDkwYWJjNGM3N2EyNjA4NWVmZQ==');

  // Load saved keys
  window.addEventListener('load', () => {
    updateStatusDots();
    renderHistory();
  });

  function updateStatusDots() {
    document.getElementById('vtDot').className = 'dot active';
    document.getElementById('usDot').className = 'dot active';
  }



  async function submitScan() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    const useVT = document.getElementById('useVT').checked;
    const useUS = document.getElementById('useUS').checked;

    if (!useVT && !useUS) {
      alert('Please select at least one scanning service.');
      return;
    }

    const vtKey = VT_API_KEY;
    const usKey = US_API_KEY;



    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.textContent = 'Scanning...';

    document.getElementById('resultsSection').classList.add('visible');
    const container = document.getElementById('resultsContainer');

    // Add to history
    addHistory(url);

    const promises = [];
    if (useVT) promises.push(scanVirusTotal(url, vtKey, container));
    if (useUS) promises.push(scanURLScan(url, usKey, container));

    await Promise.all(promises);

    btn.disabled = false;
    btn.textContent = 'Scan →';
    document.getElementById('urlInput').value = '';
  }

  async function scanVirusTotal(url, apiKey, container) {
    const cardId = 'vt-' + Date.now();
    container.insertAdjacentHTML('afterbegin', `
      <div class="result-card" id="${cardId}">
        <div class="result-card-header">
          <div class="service-badge badge-vt"><div class="badge-bar"></div>VirusTotal</div>
          <div class="verdict pending">Scanning...</div>
        </div>
        <div class="loading-msg"><div class="spinner"></div>Submitting URL for analysis...</div>
      </div>
    `);

    const card = document.getElementById(cardId);

    try {
      // Submit URL
      const submitRes = await fetch('https://www.virustotal.com/api/v3/urls', {
        method: 'POST',
        headers: {
          'x-apikey': apiKey,
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'url=' + encodeURIComponent(url)
      });

      if (!submitRes.ok) {
        const err = await submitRes.json();
        throw new Error(err.error?.message || `HTTP ${submitRes.status}`);
      }

      const submitData = await submitRes.json();
      const analysisId = submitData.data?.id;

      if (!analysisId) throw new Error('No analysis ID returned');

      // Poll for results
      let attempts = 0;
      let analysisData = null;

      while (attempts < 10) {
        await sleep(2500);
        const pollRes = await fetch(`https://www.virustotal.com/api/v3/analyses/${analysisId}`, {
          headers: { 'x-apikey': apiKey }
        });
        const pollData = await pollRes.json();
        const status = pollData.data?.attributes?.status;

        if (status === 'completed') {
          analysisData = pollData;
          break;
        }
        attempts++;
      }

      if (!analysisData) {
        // Try getting URL report directly
        const urlId = btoa(url).replace(/=/g, '');
        const reportRes = await fetch(`https://www.virustotal.com/api/v3/urls/${urlId}`, {
          headers: { 'x-apikey': apiKey }
        });
        if (reportRes.ok) {
          const reportData = await reportRes.json();
          renderVTResult(card, url, reportData.data?.attributes, null);
          return;
        }
        throw new Error('Analysis timed out. Try again in a moment.');
      }

      renderVTResult(card, url, analysisData.data?.attributes, analysisId);

    } catch (err) {
      card.querySelector('.loading-msg, .result-body')?.remove();
      card.querySelector('.verdict').className = 'verdict error';
      card.querySelector('.verdict').textContent = 'Error';
      card.insertAdjacentHTML('beforeend', `<div class="error-msg">⚠ ${err.message}</div>`);
    }
  }

  function renderVTResult(card, url, attrs, analysisId) {
    const stats = attrs?.stats || attrs?.last_analysis_stats || {};
    const malicious = stats.malicious || 0;
    const suspicious = stats.suspicious || 0;
    const harmless = stats.harmless || 0;
    const undetected = stats.undetected || 0;
    const total = malicious + suspicious + harmless + undetected;

    let verdict = 'clean';
    let verdictText = 'Clean';
    if (malicious > 0) { verdict = 'malicious'; verdictText = 'Malicious'; }
    else if (suspicious > 0) { verdict = 'suspicious'; verdictText = 'Suspicious'; }

    const reputation = attrs?.reputation ?? attrs?.url_info?.reputation ?? 'N/A';
    const categories = attrs?.categories ? Object.values(attrs.categories).join(', ') : 'N/A';
    const vtUrl = analysisId
      ? `https://www.virustotal.com/gui/url/${analysisId}`
      : `https://www.virustotal.com/gui/url/${btoa(url).replace(/=/g,'')}/detection`;

    card.innerHTML = `
      <div class="result-card-header">
        <div class="service-badge badge-vt"><div class="badge-bar"></div>VirusTotal</div>
        <div class="verdict ${verdict}">${verdictText}</div>
      </div>
      <div class="result-body">
        <div class="result-row">
          <div class="result-key">Detection</div>
          <div class="result-val">
            <div class="stats-row">
              <div class="stat-item">
                <span class="stat-count ${malicious > 0 ? 'red' : 'green'}">${malicious}</span>
                <span class="stat-label">Malicious</span>
              </div>
              <div class="stat-item">
                <span class="stat-count ${suspicious > 0 ? 'yellow' : 'muted'}">${suspicious}</span>
                <span class="stat-label">Suspicious</span>
              </div>
              <div class="stat-item">
                <span class="stat-count green">${harmless}</span>
                <span class="stat-label">Harmless</span>
              </div>
              <div class="stat-item">
                <span class="stat-count muted">${undetected}</span>
                <span class="stat-label">Undetected</span>
              </div>
              <div class="stat-item">
                <span class="stat-count muted">${total}</span>
                <span class="stat-label">Total Engines</span>
              </div>
            </div>
          </div>
        </div>
        <div class="result-row">
          <div class="result-key">Reputation</div>
          <div class="result-val">${reputation}</div>
        </div>
        <div class="result-row">
          <div class="result-key">Categories</div>
          <div class="result-val">${categories || 'N/A'}</div>
        </div>
        <div class="result-row">
          <div class="result-key">Full Report</div>
          <div class="result-val"><a href="${vtUrl}" target="_blank">View on VirusTotal →</a></div>
        </div>
      </div>
    `;
  }

  async function scanURLScan(url, apiKey, container) {
    const cardId = 'us-' + Date.now();
    container.insertAdjacentHTML('afterbegin', `
      <div class="result-card" id="${cardId}">
        <div class="result-card-header">
          <div class="service-badge badge-us"><div class="badge-bar"></div>URLScan.io</div>
          <div class="verdict pending">Scanning...</div>
        </div>
        <div class="loading-msg"><div class="spinner"></div>Submitting URL to URLScan.io...</div>
      </div>
    `);

    const card = document.getElementById(cardId);

    try {
      const submitRes = await fetch('https://urlscan.io/api/v1/scan/', {
        method: 'POST',
        headers: {
          'API-Key': apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ url, visibility: 'private' })
      });

      if (!submitRes.ok) {
        const err = await submitRes.json();
        throw new Error(err.message || err.description || `HTTP ${submitRes.status}`);
      }

      const submitData = await submitRes.json();
      const scanUuid = submitData.uuid;
      const resultUrl = submitData.result;

      if (!scanUuid) throw new Error('No scan UUID returned');

      card.querySelector('.loading-msg').innerHTML = `<div class="spinner"></div>Waiting for scan to complete (UUID: ${scanUuid.substring(0,8)}...)`;

      // Poll for result
      let attempts = 0;
      let resultData = null;

      while (attempts < 12) {
        await sleep(5000);
        const pollRes = await fetch(`https://urlscan.io/api/v1/result/${scanUuid}/`);
        if (pollRes.ok) {
          resultData = await pollRes.json();
          break;
        } else if (pollRes.status === 404) {
          attempts++;
          continue;
        } else {
          throw new Error(`Polling failed: HTTP ${pollRes.status}`);
        }
      }

      if (!resultData) throw new Error('Scan timed out. Check URLScan.io for results.');

      renderUSResult(card, resultData, scanUuid);

    } catch (err) {
      card.querySelector('.loading-msg, .result-body')?.remove();
      card.querySelector('.verdict').className = 'verdict error';
      card.querySelector('.verdict').textContent = 'Error';
      card.insertAdjacentHTML('beforeend', `<div class="error-msg">⚠ ${err.message}</div>`);
    }
  }

  function renderUSResult(card, data, uuid) {
    const verdicts = data.verdicts?.overall;
    const malicious = verdicts?.malicious || false;
    const score = verdicts?.score || 0;
    const brands = verdicts?.brands || [];
    const tags = verdicts?.tags || [];

    let verdict = 'clean';
    let verdictText = 'Clean';
    if (malicious) { verdict = 'malicious'; verdictText = 'Malicious'; }
    else if (score > 0) { verdict = 'suspicious'; verdictText = 'Suspicious'; }

    const page = data.page || {};
    const stats = data.stats || {};
    const meta = data.meta || {};

    const ip = page.ip || 'N/A';
    const country = page.country || 'N/A';
    const server = page.server || 'N/A';
    const tlsIssuer = meta.processors?.tls?.data?.[0]?.issuerCn || page.tlsIssuer || 'N/A';
    const domainAge = page.domainAge || 'N/A';

    card.innerHTML = `
      <div class="result-card-header">
        <div class="service-badge badge-us"><div class="badge-bar"></div>URLScan.io</div>
        <div class="verdict ${verdict}">${verdictText}</div>
      </div>
      <div class="result-body">
        <div class="result-row">
          <div class="result-key">Score</div>
          <div class="result-val">
            <span class="stat-count ${score > 50 ? 'red' : score > 0 ? 'yellow' : 'green'}">${score}</span>
            <span class="stat-label"> / 100</span>
            ${tags.length ? `<span style="margin-left:12px;color:var(--text-muted)">${tags.join(', ')}</span>` : ''}
          </div>
        </div>
        ${brands.length ? `
        <div class="result-row">
          <div class="result-key">Brands Detected</div>
          <div class="result-val" style="color:var(--warn)">${brands.join(', ')}</div>
        </div>` : ''}
        <div class="result-row">
          <div class="result-key">IP / Country</div>
          <div class="result-val">${ip} / ${country}</div>
        </div>
        <div class="result-row">
          <div class="result-key">Server</div>
          <div class="result-val">${server}</div>
        </div>
        <div class="result-row">
          <div class="result-key">TLS Issuer</div>
          <div class="result-val">${tlsIssuer}</div>
        </div>
        <div class="result-row">
          <div class="result-key">Resources</div>
          <div class="result-val">
            <div class="stats-row">
              <div class="stat-item">
                <span class="stat-count muted">${stats.requests || 0}</span>
                <span class="stat-label">Requests</span>
              </div>
              <div class="stat-item">
                <span class="stat-count muted">${stats.domainStats?.length || 0}</span>
                <span class="stat-label">Domains</span>
              </div>
              <div class="stat-item">
                <span class="stat-count ${(stats.malicious || 0) > 0 ? 'red' : 'muted'}">${stats.malicious || 0}</span>
                <span class="stat-label">Malicious</span>
              </div>
            </div>
          </div>
        </div>
        <div class="result-row">
          <div class="result-key">Full Report</div>
          <div class="result-val"><a href="https://urlscan.io/result/${uuid}/" target="_blank">View on URLScan.io →</a></div>
        </div>
        ${data.screenshot ? `
        <div class="result-row">
          <div class="result-key">Screenshot</div>
          <div class="result-val"><a href="${data.screenshot}" target="_blank">View Screenshot →</a></div>
        </div>` : ''}
      </div>
    `;
  }

  function clearResults() {
    document.getElementById('resultsContainer').innerHTML = '';
    document.getElementById('resultsSection').classList.remove('visible');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // History
  function addHistory(url) {
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history.unshift({ url: url, ts: Date.now() });
    if (history.length > 10) history.pop();
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function formatTimestamp(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
      + ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  function renderHistory() {
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');

    if (!history.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    list.innerHTML = history.map(function(item) {
      const ts = item.ts || Date.now();
      const d = new Date(ts);
      const fullDate = d.toLocaleString(undefined, {
        weekday: 'short', year: 'numeric', month: 'short',
        day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      return '<div class="history-item" title="' + fullDate + '" onclick="document.getElementById(\'urlInput\').value=this.dataset.url;window.scrollTo(0,0)" data-url="' + item.url.replace(/"/g,'&quot;') + '">'
        + '<div class="history-url">' + item.url + '</div>'
        + '<div class="history-meta">'
        + '<span class="history-ts" data-ts="' + ts + '">' + formatTimestamp(ts) + '</span>'
        + '<span style="color:var(--text-dim)">↑ rerun</span>'
        + '</div></div>';
    }).join('');
  }

  // Refresh relative timestamps every 30s
  setInterval(function() {
    document.querySelectorAll('.history-ts').forEach(function(el) {
      el.textContent = formatTimestamp(parseInt(el.dataset.ts));
    });
  }, 30000);

</script>
</body>
</html>
